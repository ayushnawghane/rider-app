workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # ── Android signing ──────────────────────────────────────────────────
      # Upload your keystore to Codemagic (Team Settings → Code signing)
      # and set these environment variables there (mark as secret).
      android_signing:
        - blinkcar_keystore          # name of the keystore you upload in Codemagic
      groups:
        - blinkcar_env               # group that holds CM_KEYSTORE_*, etc.
      vars:
        PACKAGE_NAME: "com.blinkcar.app"
      node: 22.11.0
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # 1. Install JS dependencies
      - name: Install npm dependencies
        script: npm ci

      # 2. Build the web bundle (tsc + vite)
      - name: Build web assets
        script: npm run build

      # 3. Sync into the Android project via Capacitor
      - name: Capacitor sync
        script: npx cap sync android

      # 4. Set executable permission on gradlew
      - name: Make gradlew executable
        script: chmod +x android/gradlew

      # 5. Build a signed release APK (and AAB for Play Store)
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      # Signed APK (sideload / direct install)
      - android/app/build/outputs/apk/release/*.apk
      # Signed AAB (Google Play Store)
      - android/app/build/outputs/bundle/release/*.aab
      # Mapping file for crash deobfuscation
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - builds@blinkcar.app          # replace with your email
        notify:
          success: true
          failure: true
      # Uncomment and configure to publish directly to Google Play:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true

  # ════════════════════════════════════════════════════════════════════════
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      # ── iOS code signing (Automatic via App Store Connect API) ───────────
      # In Codemagic → Team Settings → Code signing:
      #   1. Upload your Distribution Certificate + private key (.p12)
      #   2. Upload your App Store provisioning profile
      # Then add an App Store Connect API key under Integrations.
      ios_signing:
        distribution_type: app_store      # or: ad_hoc | development | enterprise
        bundle_identifier: com.blinkcar.app
      groups:
        - blinkcar_env                    # must contain APP_STORE_CONNECT_* vars
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.blinkcar.app"
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      node: 22.11.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # 1. Install JS dependencies
      - name: Install npm dependencies
        script: npm ci

      # 2. Build the web bundle (tsc + vite)
      - name: Build web assets
        script: npm run build

      # 3. Sync into the iOS project via Capacitor
      - name: Capacitor sync
        script: npx cap sync ios

      # 4. Set up code signing identities & provisioning profiles
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # 5. Increment build number using App Store Connect latest
      - name: Increment build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number $BUNDLE_ID)
          cd ios/App
          agvtool new-version -all $((BUILD_NUMBER + 1))

      # 6. Build & archive the Xcode project
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      # Signed IPA (App Store / TestFlight)
      - build/ios/ipa/*.ipa
      # dSYM for crash symbolication
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - builds@blinkcar.app          # replace with your email
        notify:
          success: true
          failure: true
      app_store_connect:
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        submit_to_app_store: false
