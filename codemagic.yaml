workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # ── Android signing ──────────────────────────────────────────────────
      # If CM_KEYSTORE_* variables are configured in Codemagic, they are used.
      # Otherwise the workflow creates a temporary CI keystore so Android builds
      # still produce signed artifacts for testing.
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.blinkcar.app"
        VITE_SUPABASE_URL: "https://ndlczqehttpranitnrac.supabase.co"
        VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kbGN6cWVodHRwcmFuaXRucmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4ODg3MzksImV4cCI6MjA4MzQ2NDczOX0.tB-DgvR3CRE574d9uxrPj_PCvH6qCqvyiM4fcyPuv8Y"
        VITE_APP_NAME: "Blinkcar"
        VITE_APP_VERSION: "1.0.4"
        VITE_GOOGLE_MAPS_API_KEY: "AIzaSyA02Wa6Ozs1KrYJWSyURFoyMtjaC9wx02U"
      node: 22.11.0
      java: 21

    scripts:
      # 1. Install JS dependencies
      - name: Install npm dependencies
        script: npm ci

      # 2. Sync semantic app version to native projects
      - name: Sync semantic version
        script: npm run version:sync

      # 3. Build the web bundle (tsc + vite)
      - name: Build web assets
        script: npm run build

      # 4. Sync into the Android project via Capacitor
      - name: Capacitor sync
        script: npx cap sync android

      # 5. Set executable permission on gradlew
      - name: Make gradlew executable
        script: chmod +x android/gradlew

      # 6. Build a signed release APK (and AAB for Play Store)
      - name: Build Android release
        script: |
          APP_VERSION=$(node -p "require('./package.json').version")
          VERSION_CODE=${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-1}}
          if [ -z "$CM_KEYSTORE_PATH" ]; then
            export CM_KEYSTORE_PATH="/tmp/blinkcar-ci-upload.jks"
            export CM_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-temporary-ci-password}"
            export CM_KEY_ALIAS="${ANDROID_KEY_ALIAS:-blinkcar}"
            export CM_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$CM_KEYSTORE_PASSWORD}"
            keytool -genkeypair \
              -keystore "$CM_KEYSTORE_PATH" \
              -storepass "$CM_KEYSTORE_PASSWORD" \
              -alias "$CM_KEY_ALIAS" \
              -keypass "$CM_KEY_PASSWORD" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Blinkcar, OU=CI, O=Blinkcar, L=Mumbai, S=Maharashtra, C=IN"
          fi
          cd android
          ./gradlew bundleRelease assembleRelease \
            -PappVersionCode=$VERSION_CODE \
            -PappVersionName=$APP_VERSION \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      # Signed APK (sideload / direct install)
      - android/app/build/outputs/apk/release/*.apk
      # Signed AAB (Google Play Store)
      - android/app/build/outputs/bundle/release/*.aab
      # Mapping file for crash deobfuscation
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - omkarmohite9834@gmail.com        # Codemagic account email
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  # ════════════════════════════════════════════════════════════════════════
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic CI

    environment:
      # ── iOS code signing (Automatic via App Store Connect API) ───────────
      # The build script below fetches/creates signing files through the
      # App Store Connect integration. Do not also configure ios_signing here,
      # otherwise Codemagic may prefetch an old uploaded profile/certificate
      # pair before the fresh profile is generated.
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.blinkcar.app"
        VITE_SUPABASE_URL: "https://ndlczqehttpranitnrac.supabase.co"
        VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kbGN6cWVodHRwcmFuaXRucmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4ODg3MzksImV4cCI6MjA4MzQ2NDczOX0.tB-DgvR3CRE574d9uxrPj_PCvH6qCqvyiM4fcyPuv8Y"
        VITE_APP_NAME: "BlinkCar"
        VITE_APP_VERSION: "1.0.4"
        VITE_GOOGLE_MAPS_API_KEY: "AIzaSyA02Wa6Ozs1KrYJWSyURFoyMtjaC9wx02U"
      node: 22.11.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      # 1. Install JS dependencies
      - name: Install npm dependencies
        script: npm ci

      # 2. Sync semantic app version to native projects
      - name: Sync semantic version
        script: npm run version:sync

      # 3. Build the web bundle (tsc + vite)
      - name: Build web assets
        script: npm run build

      # 4. Sync into the iOS project via Capacitor
      - name: Capacitor sync
        script: npx cap sync ios

      # 5. Set up code signing identities & provisioning profiles
      # Fetch/create the distribution cert + App Store profile via the App Store
      # Connect API so the profile always reflects the App ID's current
      # capabilities (e.g. Sign in with Apple). The API key (Integrations →
      # App Store Connect) must have the App Manager or Admin role.
      - name: Set up code signing
        script: |
          keychain initialize
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          security find-identity -v -p codesigning || true
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          xcode-project use-profiles

      # 6. Increment build number above existing App Store Connect builds
      - name: Increment build number
        script: |
          if [ -n "$BUILD_NUMBER" ]; then
            CI_BUILD_NUMBER="$BUILD_NUMBER"
          elif [ -n "$PROJECT_BUILD_NUMBER" ]; then
            CI_BUILD_NUMBER="$PROJECT_BUILD_NUMBER"
          else
            CI_BUILD_NUMBER=$(date +%s)
          fi
          IOS_BUILD_NUMBER=$((100 + CI_BUILD_NUMBER))
          cd ios/App
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $IOS_BUILD_NUMBER;/g" App.xcodeproj/project.pbxproj
          agvtool new-version -all "$IOS_BUILD_NUMBER"
          echo "Using iOS build number: $IOS_BUILD_NUMBER"
          grep -n "CURRENT_PROJECT_VERSION =" App.xcodeproj/project.pbxproj

      # 7. Build & archive the Xcode project
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" || BUILD_FAILED=1
          if [ -n "$BUILD_FAILED" ]; then
            echo "================= xcodebuild error excerpt ================="
            for log in /tmp/xcodebuild_logs/*.log; do
              [ -f "$log" ] || continue
              echo "----- $log -----"
              grep -nE "error:|doesn't include|No profiles|entitlement|provision|Signing for|requires a" "$log" | tail -80
              echo "----- last 60 lines of $log -----"
              tail -60 "$log"
            done
            echo "==========================================================="
            exit 65
          fi

    artifacts:
      # Signed IPA (App Store / TestFlight)
      - build/ios/ipa/*.ipa
      # dSYM for crash symbolication
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          -  omkarmohite9834@gmail.com        # Codemagic account email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
